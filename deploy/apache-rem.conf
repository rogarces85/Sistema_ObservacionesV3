<VirtualHost *:443>
    ServerName rem.example.cl
    ServerAdmin ops@rem.example.cl
    DocumentRoot /var/www/rem

    SetEnv REM_ENV_FILE /etc/rem/env.php
    SetEnv REM_ENVIRONMENT production
    SetEnv REM_COOKIE_SECURE 1

    <Directory /var/www/rem>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^(config|\.env|\.gitignore|composer\.(json|lock))$">
        Require all denied
    </FilesMatch>

    <Directory /var/www/rem/uploads>
        php_flag engine off
        AddType text/plain .php .phtml .php3 .php4 .php5 .php7 .phps .pht
        <FilesMatch "\.(php|phtml|php3|php4|php5|php7|phps|pht)$">
            Require all denied
        </FilesMatch>
    </Directory>

    <Directory /var/www/rem/config>
        Require all denied
    </Directory>

    <Directory /var/www/rem/includes>
        Require all denied
    </Directory>

    <Directory /var/www/rem/models>
        Require all denied
    </Directory>

    <Directory /var/www/rem/api>
        <FilesMatch "\.php$">
            Require all granted
        </FilesMatch>
    </Directory>

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/rem.example.cl/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/rem.example.cl/privkey.pem
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          HIGH:!aNULL:!MD5
    SSLHonorCipherOrder     on

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # Ocultar version
    ServerTokens Prod
    Header always unset X-Powered-By

    ErrorLog  /var/log/apache2/rem-error.log
    CustomLog /var/log/apache2/rem-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName rem.example.cl
    Redirect permanent / https://rem.example.cl/
</VirtualHost>
