# /etc/fail2ban/filter.d/rem-auth.conf
# Filtro fail2ban para intentos fallidos de login en el Sistema REM.
# Detecta patrones como "Credenciales invalidas" o "Usuario y contrasena
# son requeridos" en logs de Apache.

[Definition]
failregex = ^<HOST> -.*POST https?://[^/]+/api/auth\.php\?action=login HTTP/1\.[01]" [23]03
            ^<HOST> -.*"POST .*login.*" 401
ignoreregex =
